<div class="dashboard">
  <header class="dashboard-header">
    <div class="dashboard-header__text">
      <span class="eyebrow">{{ 'dashboard.eyebrow' | transloco }}</span>
      <h1>{{ today() }}</h1>
    </div>
    <div class="dashboard-header__actions">
      <a routerLink="/history" class="settings-link">{{ 'dashboard.history' | transloco }}</a>
      <app-lang-switcher />
      <a routerLink="/settings" class="settings-link">{{ 'dashboard.settings' | transloco }}</a>
      <app-tenure-badge />
    </div>
  </header>

  <section class="dashboard-grid">
    <app-time-tracker />
    <app-todo />
    <app-daily-log />
  </section>
</div>
