<div class="log-card">
  <h3>Günlük Notlar</h3>

  <form class="log-form" (submit)="$event.preventDefault(); addEntry()">
    <textarea
      placeholder="Bugün ne yaptın, ne oldu..."
      [value]="newEntry()"
      (input)="newEntry.set($any($event.target).value)"
      rows="2"
    ></textarea>
    <button type="submit">Not Ekle</button>
  </form>

  <div class="log-filters">
    <input
      type="text"
      class="search-input"
      placeholder="Notlarda ara..."
      [value]="searchInput()"
      (input)="onSearchInput($any($event.target).value)"
    />
    <div class="date-range">
      <input
        type="date"
        [value]="dateFrom()"
        (change)="onDateFromChange($any($event.target).value)"
      />
      <span class="date-sep">–</span>
      <input
        type="date"
        [value]="dateTo()"
        (change)="onDateToChange($any($event.target).value)"
      />
    </div>
    @if (isFiltering()) {
      <button type="button" class="clear-filters-btn" (click)="clearFilters()">
        Filtreyi temizle
      </button>
    }
  </div>

  <ul class="log-list">
    @for (log of displayedLogs(); track log.id) {
      <li>
        <span class="log-time">{{ formatTime(log.createdAt) }}</span>
        <span class="log-content">{{ log.content }}</span>
        <button type="button" class="remove-btn" (click)="removeEntry(log.id)" aria-label="Notu sil">
          ✕
        </button>
      </li>
    } @empty {
      <li class="empty-state">
        {{ isFiltering() ? 'Aramanızla eşleşen kayıt bulunamadı.' : 'Bugün için henüz not yok.' }}
      </li>
    }
  </ul>
</div>
